<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Family Calendar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   CSS RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FDF6EE;
  --surface: #FFFFFF;
  --surface-hover: #FFF8F0;
  --border: #E8DDD0;
  --border-light: #F0E8DC;
  --text: #3D3229;
  --text-secondary: #8A7968;
  --text-muted: #B5A898;
  --accent: #4A90D9;
  --accent-light: #E8F0FB;
  --accent-dark: #3570B0;
  --busy: #B0B8C4;
  --busy-bg: #E8ECF0;
  --today-bg: #FFF3E0;
  --today-border: #FF9800;
  --danger: #E74C3C;
  --danger-light: #FDEDEC;
  --success: #27AE60;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --touch-min: 44px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --transition: 0.2s ease;
}

html, body {
  height: 100%; width: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-y;
}

button {
  font-family: var(--font);
  cursor: pointer;
  border: none;
  background: none;
  font-size: inherit;
  color: inherit;
  -webkit-tap-highlight-color: transparent;
}

input, select, textarea {
  font-family: var(--font);
  font-size: 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  background: var(--surface);
  color: var(--text);
  width: 100%;
  transition: border-color var(--transition);
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
#loginScreen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  width: 100vw;
  background: var(--bg);
}

.login-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 48px 40px;
  width: min(440px, 90vw);
  text-align: center;
}

.login-title {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
}

.login-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.login-tabs {
  display: flex;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
  margin-bottom: 24px;
}

.login-tabs button {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.login-tabs button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.login-form { text-align: left; }
.login-form .form-group { margin-bottom: 16px; }

.login-message {
  padding: 16px;
  border-radius: var(--radius-sm);
  background: var(--accent-light);
  color: var(--accent-dark);
  font-size: 14px;
  font-weight: 500;
  margin-top: 16px;
  display: none;
}

.login-error {
  background: var(--danger-light);
  color: var(--danger);
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  display: none;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
}

#app.visible {
  display: flex;
}

/* ---------- Header ---------- */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  z-index: 10;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.header-date {
  font-size: 15px;
  color: var(--text-secondary);
  font-weight: 500;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: var(--touch-min);
  min-height: var(--touch-min);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  padding: 8px 16px;
  transition: all var(--transition);
}
.nav-btn:hover { background: var(--surface-hover); }
.nav-btn:active { transform: scale(0.96); }
.nav-btn.primary {
  background: var(--accent);
  color: #fff;
}
.nav-btn.primary:hover { background: var(--accent-dark); }

.nav-arrow {
  font-size: 20px;
  padding: 8px 12px;
  min-width: var(--touch-min);
}
.month-label {
  font-size: 20px;
  font-weight: 700;
  min-width: 220px;
  text-align: center;
}

.view-toggle {
  display: flex;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}
.view-toggle button {
  padding: 8px 18px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  transition: all var(--transition);
}
.view-toggle button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.clock {
  font-size: 28px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 1px;
  font-variant-numeric: tabular-nums;
  min-width: 90px;
  text-align: right;
}

.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
}
.user-avatar:hover { background: var(--accent-dark); }

/* ---------- Calendar Grid ---------- */
.calendar-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 12px 16px 8px;
  overflow: hidden;
}
.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 4px;
}
.weekday-cell {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  padding: 4px 0;
}
.month-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 4px;
}
.day-cell {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  cursor: pointer;
  transition: all var(--transition);
  border: 2px solid transparent;
  position: relative;
}
.day-cell:hover { border-color: var(--accent-light); box-shadow: var(--shadow-sm); }
.day-cell:active { transform: scale(0.98); }
.day-cell.other-month {
  background: transparent;
  opacity: 0.35;
}
.day-cell.today {
  background: var(--today-bg);
  border-color: var(--today-border);
  box-shadow: 0 0 0 1px var(--today-border);
}
.day-number {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 3px;
  color: var(--text);
}
.day-cell.today .day-number {
  color: var(--today-border);
}
.day-events {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.event-chip {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
  line-height: 1.4;
  cursor: pointer;
}
.event-chip:active { opacity: 0.8; }
.event-chip.busy {
  background: var(--busy-bg);
  color: var(--busy);
  font-style: italic;
  font-weight: 500;
}
.event-more {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600;
  padding-top: 1px;
}

/* ---------- Week View ---------- */
.week-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 60px repeat(7, 1fr);
  overflow-y: auto;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.week-grid::-webkit-scrollbar { width: 6px; }
.week-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.week-header-spacer {
  grid-column: 1;
  position: sticky; top: 0; z-index: 2;
  background: var(--surface);
}
.week-header-cell {
  position: sticky; top: 0; z-index: 2;
  background: var(--surface);
  text-align: center;
  padding: 10px 4px;
  font-size: 13px;
  font-weight: 700;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-secondary);
}
.week-header-cell.today-col {
  color: var(--today-border);
}
.week-header-cell .day-num {
  display: block;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.week-header-cell.today-col .day-num {
  color: var(--today-border);
}
.time-label {
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
  padding: 0 8px;
  border-right: 1px solid var(--border-light);
  height: 60px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding-top: 2px;
}
.week-col-cell {
  height: 60px;
  border-bottom: 1px solid var(--border-light);
  border-right: 1px solid var(--border-light);
  position: relative;
  cursor: pointer;
}
.week-col-cell:hover { background: var(--surface-hover); }
.week-col-cell.today-col { background: #FFFAF0; }

.week-event {
  position: absolute;
  left: 2px; right: 2px;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  overflow: hidden;
  z-index: 1;
  cursor: pointer;
  line-height: 1.3;
}
.week-event.busy {
  background: var(--busy-bg);
  color: var(--busy);
  font-style: italic;
  font-weight: 500;
}

.now-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--danger);
  z-index: 3;
  pointer-events: none;
}
.now-line::before {
  content: '';
  position: absolute;
  left: -4px; top: -4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--danger);
}

/* ============================================================
   MODAL / OVERLAY
   ============================================================ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s;
}
.modal-overlay.open { display: flex; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: min(500px, 90vw);
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.25s;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 12px;
}
.modal-title {
  font-size: 20px;
  font-weight: 700;
}
.modal-close {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--text-muted);
  transition: all var(--transition);
}
.modal-close:hover { background: var(--bg); color: var(--text); }

.modal-body { padding: 8px 24px 24px; }

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.color-picker {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.color-swatch {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); box-shadow: var(--shadow-md); }

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  padding-top: 8px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: var(--touch-min);
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  transition: all var(--transition);
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #C0392B; }
.btn-ghost { color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg); }

/* ---------- Settings/User Panel ---------- */
.settings-panel {
  display: none;
  position: fixed;
  top: 0; right: 0;
  width: min(420px, 100vw);
  height: 100vh;
  background: var(--surface);
  box-shadow: var(--shadow-lg);
  z-index: 200;
  flex-direction: column;
  animation: slideIn 0.25s;
}
.settings-panel.open { display: flex; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-light);
}
.settings-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.settings-section {
  margin-bottom: 28px;
}
.settings-section-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.settings-note {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 6px;
  line-height: 1.4;
}
.settings-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.user-email {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
}
.status-badge.connected { background: #E8F8EE; color: var(--success); }
.status-badge.disconnected { background: var(--danger-light); color: var(--danger); }
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
}

/* ---------- Floating Action Button ---------- */
.fab {
  position: fixed;
  bottom: 32px;
  right: 32px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(74,144,217,0.4);
  z-index: 50;
  transition: all var(--transition);
  cursor: pointer;
  border: none;
  line-height: 1;
}
.fab:hover { background: var(--accent-dark); transform: scale(1.08); box-shadow: 0 6px 24px rgba(74,144,217,0.5); }
.fab:active { transform: scale(0.95); }

/* ---------- Toast ---------- */
.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.toast {
  background: var(--text);
  color: #fff;
  padding: 12px 24px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s;
  white-space: nowrap;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } }

/* ---------- Responsive ---------- */
@media (max-width: 900px) {
  .header { padding: 8px 12px; }
  .month-label { font-size: 16px; min-width: 160px; }
  .clock { font-size: 22px; }
  .calendar-body { padding: 8px; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">🏠 Family Calendar</div>
    <div class="login-subtitle">Sign in to manage your family's schedule</div>

    <div class="login-tabs">
      <button class="active" onclick="switchLoginTab('magic')">Magic Link</button>
      <button onclick="switchLoginTab('password')">Password</button>
    </div>

    <!-- Magic Link Tab -->
    <div id="magicTab" class="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="sendMagicLink()">Send Magic Link</button>
      <div id="magicMessage" class="login-message"></div>
    </div>

    <!-- Password Tab -->
    <div id="passwordTab" class="login-form" style="display:none;">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmailPwd" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="signInWithPassword()">Sign In</button>
      <div id="passwordMessage" class="login-message"></div>
    </div>
  </div>
</div>

<!-- CALENDAR APP -->
<div id="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div>
        <div class="header-title">🏠 Family Calendar</div>
        <div class="header-date" id="headerDate"></div>
      </div>
    </div>

    <div style="display:flex; align-items:center; gap:8px;">
      <button class="nav-btn nav-arrow" onclick="navigateMonth(-1)" title="Previous">&#x276E;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn nav-arrow" onclick="navigateMonth(1)" title="Next">&#x276F;</button>
      <button class="nav-btn" onclick="goToday()" style="margin-left:8px;">Today</button>
    </div>

    <div class="header-right">
      <div class="view-toggle">
        <button id="btnMonth" class="active" onclick="setView('month')">Month</button>
        <button id="btnWeek" onclick="setView('week')">Week</button>
      </div>
      <div class="clock" id="clock"></div>
      <button class="user-avatar" id="userAvatar" onclick="openSettings()" title="User menu"></button>
    </div>
  </header>

  <!-- CALENDAR BODY -->
  <div class="calendar-body" id="calendarBody"></div>
</div>

<!-- FLOATING ADD EVENT BUTTON -->
<button class="fab" id="fabAdd" onclick="onFabClick()" title="Add Event">+</button>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Event</div>
      <button class="modal-close" onclick="closeEventModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" id="eventTitle" placeholder="Family dinner, Soccer practice..." autofocus>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start</label>
          <input type="datetime-local" id="eventStart">
        </div>
        <div class="form-group">
          <label class="form-label">End</label>
          <input type="datetime-local" id="eventEnd">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="eventDesc" rows="2" placeholder="Optional notes..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Who's adding this?</label>
        <input type="text" id="eventCreator" placeholder="Dave, Sarah...">
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="btnDelete" style="display:none;margin-right:auto;" onclick="deleteEvent()">Delete</button>
        <button class="btn btn-ghost" onclick="closeEventModal()">Cancel</button>
        <button class="btn btn-primary" id="btnSave" onclick="saveEvent()">Save Event</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS/USER PANEL -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <div class="modal-title">Settings</div>
    <button class="modal-close" onclick="closeSettings()">&times;</button>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <div class="user-email" id="userEmailDisplay"></div>
      <button class="btn btn-ghost" style="width:100%; margin-bottom:16px;" onclick="signOut()">Sign Out</button>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">Display</div>
      <div class="form-group">
        <label class="form-label">Refresh interval (minutes)</label>
        <input type="number" id="settRefresh" min="1" max="60" value="5">
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">Work Calendar (ICS)</div>
      <div class="form-group">
        <label class="form-label">Cached ICS path</label>
        <input type="text" id="settIcsPath" placeholder="calendar.ics" value="calendar.ics">
      </div>
      <div class="settings-note">The GitHub Action caches your Outlook ICS feed to this file in the repo.</div>
    </div>
  </div>
  <div class="settings-footer">
    <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
    <button class="btn btn-primary" onclick="saveSettings()">Save</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toasts"></div>

<script>
/* ================================================================
   SUPABASE CONFIGURATION
   ================================================================ */
const SUPABASE_URL = '__SUPABASE_URL__';
const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';

let sb = null;
let currentUser = null;

// Initialize Supabase client
if (SUPABASE_URL !== '__SUPABASE_URL__' && SUPABASE_ANON_KEY !== '__SUPABASE_ANON_KEY__') {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

/* ================================================================
   STATE
   ================================================================ */
const EVENT_COLORS = [
  '#4A90D9','#E67E22','#27AE60','#9B59B6',
  '#E74C3C','#1ABC9C','#F39C12','#8E44AD',
  '#2ECC71','#E84393','#00B894','#6C5CE7'
];

let state = {
  view: 'month',
  currentDate: new Date(),
  familyEvents: [],
  workEvents: [],
  editingEvent: null,
  selectedColor: EVENT_COLORS[0],
  icsPath: 'calendar.ics',
  refreshMin: 5,
};

let refreshTimer = null;

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  if (!sb) {
    toast('Supabase not configured. Check placeholders.');
    return;
  }

  // Check auth state
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
    initApp();
  } else {
    showLogin();
  }

  // Listen for auth changes
  const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
    if (session) {
      currentUser = session.user;
      showApp();
      if (!document.getElementById('app').classList.contains('visible')) {
        initApp();
      }
    } else {
      currentUser = null;
      showLogin();
    }
  });
});

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
}

function initApp() {
  loadSettings();
  renderColorPicker();
  updateClock();
  updateUserAvatar();
  setInterval(updateClock, 1000);
  render();
  refreshData();
  scheduleRefresh();
}

/* ================================================================
   LOGIN / AUTH
   ================================================================ */
function switchLoginTab(tab) {
  const magic = document.getElementById('magicTab');
  const password = document.getElementById('passwordTab');
  const buttons = document.querySelectorAll('.login-tabs button');

  if (tab === 'magic') {
    magic.style.display = 'block';
    password.style.display = 'none';
    buttons[0].classList.add('active');
    buttons[1].classList.remove('active');
  } else {
    magic.style.display = 'none';
    password.style.display = 'block';
    buttons[0].classList.remove('active');
    buttons[1].classList.add('active');
  }
}

async function sendMagicLink() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { toast('Please enter your email'); return; }

  const msgEl = document.getElementById('magicMessage');
  msgEl.textContent = 'Sending...';
  msgEl.classList.remove('login-error');
  msgEl.style.display = 'block';

  try {
    const { error } = await sb.auth.signInWithOtp({ email });
    if (error) throw error;
    msgEl.textContent = 'Check your email for a login link!';
    document.getElementById('loginEmail').value = '';
  } catch (e) {
    msgEl.textContent = 'Error: ' + (e.message || 'Unable to send link');
    msgEl.classList.add('login-error');
  }
}

async function signInWithPassword() {
  const email = document.getElementById('loginEmailPwd').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) { toast('Please enter email and password'); return; }

  const msgEl = document.getElementById('passwordMessage');
  msgEl.textContent = 'Signing in...';
  msgEl.classList.remove('login-error');
  msgEl.style.display = 'block';

  try {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    document.getElementById('loginEmailPwd').value = '';
    document.getElementById('loginPassword').value = '';
  } catch (e) {
    msgEl.textContent = 'Error: ' + (e.message || 'Unable to sign in');
    msgEl.classList.add('login-error');
  }
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  closeSettings();
  showLogin();
}

function updateUserAvatar() {
  if (!currentUser) return;
  const avatar = document.getElementById('userAvatar');
  const initial = (currentUser.email || 'U')[0].toUpperCase();
  avatar.textContent = initial;

  const emailDisplay = document.getElementById('userEmailDisplay');
  emailDisplay.textContent = currentUser.email;
}

/* ================================================================
   SETTINGS / PERSISTENCE
   ================================================================ */
function loadSettings() {
  const s = localStorage.getItem('fc_settings');
  if (s) {
    try {
      const p = JSON.parse(s);
      state.icsPath = p.icsPath || 'calendar.ics';
      state.refreshMin = p.refreshMin || 5;
    } catch(e) {}
  }
  const creator = localStorage.getItem('fc_creator');
  if (creator) document.getElementById('eventCreator').value = creator;
}

function saveSettings() {
  state.icsPath = document.getElementById('settIcsPath').value.trim() || 'calendar.ics';
  state.refreshMin = parseInt(document.getElementById('settRefresh').value) || 5;

  localStorage.setItem('fc_settings', JSON.stringify({
    icsPath: state.icsPath,
    refreshMin: state.refreshMin,
  }));

  closeSettings();
  refreshData();
  scheduleRefresh();
  toast('Settings saved');
}

function openSettings() {
  document.getElementById('settIcsPath').value = state.icsPath;
  document.getElementById('settRefresh').value = state.refreshMin;
  document.getElementById('settingsPanel').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
}

/* ================================================================
   DATA FETCHING
   ================================================================ */
async function refreshData() {
  await Promise.all([fetchFamilyEvents(), fetchWorkCalendar()]);
  render();
}

function scheduleRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshData, state.refreshMin * 60 * 1000);
}

/* ----- Supabase Family Events ----- */
async function fetchFamilyEvents() {
  if (!sb) return;
  try {
    const { data, error } = await sb
      .from('events')
      .select('*')
      .order('start_time', { ascending: true });

    if (error) throw error;
    state.familyEvents = data || [];
  } catch(e) {
    console.error('Supabase fetch error:', e);
  }
}

async function supabaseUpsert(evt) {
  if (!sb) { toast('Supabase not configured'); return null; }

  const isNew = !evt.id;
  const body = {
    title: evt.title,
    start_time: evt.start_time,
    end_time: evt.end_time,
    color: evt.color,
    description: evt.description || '',
    created_by: evt.created_by || '',
  };

  try {
    let result;
    if (isNew) {
      const { data, error } = await sb.from('events').insert([body]).select();
      if (error) throw error;
      result = data[0];
    } else {
      const { data, error } = await sb
        .from('events')
        .update(body)
        .eq('id', evt.id)
        .select();
      if (error) throw error;
      result = data[0];
    }
    return result;
  } catch(e) {
    console.error('Supabase upsert error:', e);
    toast('Error saving event');
    return null;
  }
}

async function supabaseDelete(id) {
  if (!sb) return;
  try {
    const { error } = await sb.from('events').delete().eq('id', id);
    if (error) throw error;
  } catch(e) {
    console.error('Supabase delete error:', e);
    toast('Error deleting event');
  }
}

/* ----- ICS Work Calendar ----- */
async function fetchWorkCalendar() {
  try {
    const res = await fetch(state.icsPath + '?t=' + Date.now());
    if (!res.ok) return;
    const text = await res.text();
    state.workEvents = parseICS(text);
  } catch(e) {
    console.warn('ICS fetch failed:', e);
  }
}

function parseICS(text) {
  const events = [];
  const lines = text.replace(/\r\n /g, '').replace(/\r/g, '\n').split('\n');
  let evt = null;
  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') { evt = {}; continue; }
    if (line === 'END:VEVENT' && evt) {
      if (evt.start && evt.end) {
        events.push({ title: 'Busy', start: evt.start, end: evt.end, isBusy: true });
      }
      evt = null;
      continue;
    }
    if (!evt) continue;
    if (line.startsWith('DTSTART')) {
      evt.start = parseICSDate(line);
    } else if (line.startsWith('DTEND')) {
      evt.end = parseICSDate(line);
    }
  }
  return events;
}

function parseICSDate(line) {
  const val = line.split(':').pop();
  if (!val) return null;
  if (val.length === 8) {
    return new Date(val.slice(0,4) + '-' + val.slice(4,6) + '-' + val.slice(6,8));
  }
  const y = val.slice(0,4), mo = val.slice(4,6), d = val.slice(6,8);
  const h = val.slice(9,11), mi = val.slice(11,13), s = val.slice(13,15);
  const iso = `${y}-${mo}-${d}T${h}:${mi}:${s}` + (val.endsWith('Z') ? 'Z' : '');
  return new Date(iso);
}

/* ================================================================
   CLOCK
   ================================================================ */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  document.getElementById('headerDate').textContent = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

/* ================================================================
   NAVIGATION
   ================================================================ */
function navigateMonth(dir) {
  if (state.view === 'month') {
    state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + dir, 1);
  } else {
    const d = new Date(state.currentDate);
    d.setDate(d.getDate() + dir * 7);
    state.currentDate = d;
  }
  render();
}

function goToday() {
  state.currentDate = new Date();
  render();
}

function setView(v) {
  state.view = v;
  document.getElementById('btnMonth').classList.toggle('active', v === 'month');
  document.getElementById('btnWeek').classList.toggle('active', v === 'week');
  render();
}

/* ================================================================
   RENDERING — MONTH VIEW
   ================================================================ */
function render() {
  const body = document.getElementById('calendarBody');
  if (state.view === 'month') {
    renderMonth(body);
  } else {
    renderWeek(body);
  }
  updateMonthLabel();
}

function updateMonthLabel() {
  const d = state.currentDate;
  if (state.view === 'month') {
    document.getElementById('monthLabel').textContent =
      d.toLocaleDateString([], { month: 'long', year: 'numeric' });
  } else {
    const start = getWeekStart(d);
    const end = new Date(start); end.setDate(end.getDate() + 6);
    const fmt = { month: 'short', day: 'numeric' };
    document.getElementById('monthLabel').textContent =
      start.toLocaleDateString([], fmt) + ' — ' + end.toLocaleDateString([], { ...fmt, year: 'numeric' });
  }
}

function renderMonth(container) {
  const today = new Date();
  const year = state.currentDate.getFullYear();
  const month = state.currentDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = (firstDay.getDay() + 6) % 7;
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - startOffset);

  let html = '<div class="weekday-row">';
  for (const d of ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']) {
    html += `<div class="weekday-cell">${d}</div>`;
  }
  html += '</div><div class="month-grid">';

  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    const isOther = d.getMonth() !== month;
    const isToday = sameDay(d, today);
    const dayStr = dateStr(d);
    const evts = getEventsForDay(d);

    html += `<div class="day-cell${isOther ? ' other-month' : ''}${isToday ? ' today' : ''}"
              onclick="onDayClick('${dayStr}')" data-date="${dayStr}">`;
    html += `<div class="day-number">${d.getDate()}</div>`;
    html += '<div class="day-events">';

    const maxShow = 3;
    for (let j = 0; j < Math.min(evts.length, maxShow); j++) {
      const e = evts[j];
      if (e.isBusy) {
        const t = formatTime(e.start) + '–' + formatTime(e.end);
        html += `<div class="event-chip busy">${t} Busy</div>`;
      } else {
        const t = formatTime(new Date(e.start_time));
        const who = e.created_by ? ' · ' + esc(e.created_by) : '';
        html += `<div class="event-chip" style="background:${e.color || '#4A90D9'}"
                  onclick="event.stopPropagation();editEvent('${e.id}')">${t} ${esc(e.title)}${who}</div>`;
      }
    }
    if (evts.length > maxShow) {
      html += `<div class="event-more">+${evts.length - maxShow} more</div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

/* ================================================================
   RENDERING — WEEK VIEW
   ================================================================ */
function renderWeek(container) {
  const today = new Date();
  const weekStart = getWeekStart(state.currentDate);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  let html = '<div class="week-grid" id="weekGrid">';
  html += '<div class="week-header-spacer"></div>';
  for (const d of days) {
    const isToday = sameDay(d, today);
    const dayName = d.toLocaleDateString([], { weekday: 'short' });
    html += `<div class="week-header-cell${isToday ? ' today-col' : ''}">
      ${dayName}<span class="day-num">${d.getDate()}</span></div>`;
  }

  for (let h = 6; h <= 22; h++) {
    const label = h === 0 ? '12 AM' : h < 12 ? h + ' AM' : h === 12 ? '12 PM' : (h - 12) + ' PM';
    html += `<div class="time-label">${label}</div>`;
    for (let di = 0; di < 7; di++) {
      const d = days[di];
      const isToday = sameDay(d, today);
      const dStr = dateStr(d);
      html += `<div class="week-col-cell${isToday ? ' today-col' : ''}" data-date="${dStr}" data-hour="${h}"
                onclick="onWeekCellClick('${dStr}',${h})"></div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;

  const grid = document.getElementById('weekGrid');
  for (const d of days) {
    const evts = getEventsForDay(d);
    for (const e of evts) {
      const start = e.isBusy ? e.start : new Date(e.start_time);
      const end = e.isBusy ? e.end : new Date(e.end_time);
      const startH = start.getHours() + start.getMinutes() / 60;
      const endH = end.getHours() + end.getMinutes() / 60;
      if (endH <= 6 || startH >= 23) continue;
      const top = Math.max(0, (startH - 6)) * 60;
      const height = Math.max(15, (Math.min(endH, 23) - Math.max(startH, 6)) * 60);

      const hourCell = grid.querySelector(`.week-col-cell[data-date="${dateStr(d)}"][data-hour="${Math.max(6, Math.floor(startH))}"]`);
      if (!hourCell) continue;

      const div = document.createElement('div');
      div.className = 'week-event' + (e.isBusy ? ' busy' : '');
      if (!e.isBusy) {
        div.style.background = e.color || '#4A90D9';
        const who = e.created_by ? ' · ' + e.created_by : '';
        div.textContent = formatTime(start) + ' ' + e.title + who;
        div.onclick = () => editEvent(e.id);
      } else {
        div.textContent = formatTime(start) + '–' + formatTime(end) + ' Busy';
      }

      const gridRect = grid.getBoundingClientRect();
      const cellRect = hourCell.getBoundingClientRect();
      const cellTop = cellRect.top - gridRect.top + grid.scrollTop;
      const minuteOffset = (startH - Math.max(6, Math.floor(startH))) * 60;

      div.style.position = 'absolute';
      div.style.top = (cellTop + minuteOffset) + 'px';
      div.style.height = height + 'px';
      div.style.left = cellRect.left - gridRect.left + 2 + 'px';
      div.style.width = (cellRect.width - 4) + 'px';
      grid.appendChild(div);
    }
  }

  if (days.some(d => sameDay(d, today))) {
    const now = new Date();
    const h = now.getHours() + now.getMinutes() / 60;
    if (h >= 6 && h <= 23) {
      const cell = grid.querySelector(`.week-col-cell.today-col[data-hour="${Math.floor(h)}"]`);
      if (cell) {
        const gridRect = grid.getBoundingClientRect();
        const cellRect = cell.getBoundingClientRect();
        const top = cellRect.top - gridRect.top + grid.scrollTop + (h - Math.floor(h)) * 60;
        const line = document.createElement('div');
        line.className = 'now-line';
        line.style.position = 'absolute';
        line.style.top = top + 'px';
        const firstColCell = grid.querySelector('.week-col-cell[data-hour="6"]');
        if (firstColCell) {
          const firstRect = firstColCell.getBoundingClientRect();
          line.style.left = (firstRect.left - gridRect.left) + 'px';
          line.style.right = '0';
        }
        grid.appendChild(line);
      }
    }
  }

  requestAnimationFrame(() => {
    const g = document.getElementById('weekGrid');
    if (g) g.scrollTop = 2 * 60;
  });
}

/* ================================================================
   EVENT HELPERS
   ================================================================ */
function getEventsForDay(d) {
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dayEnd = new Date(dayStart);
  dayEnd.setDate(dayEnd.getDate() + 1);

  const family = state.familyEvents.filter(e => {
    const s = new Date(e.start_time);
    const en = new Date(e.end_time);
    return s < dayEnd && en > dayStart;
  });

  const work = state.workEvents.filter(e => {
    return e.start < dayEnd && e.end > dayStart;
  });

  return [...family, ...work].sort((a, b) => {
    const sa = a.isBusy ? a.start : new Date(a.start_time);
    const sb = b.isBusy ? b.start : new Date(b.start_time);
    return sa - sb;
  });
}

function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function formatTime(d) {
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function getWeekStart(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  const start = new Date(d);
  start.setDate(d.getDate() + diff);
  start.setHours(0, 0, 0, 0);
  return start;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ================================================================
   EVENT MODAL
   ================================================================ */
function onDayClick(dayStr) {
  state.editingEvent = null;
  document.getElementById('modalTitle').textContent = 'New Event';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('btnSave').textContent = 'Save Event';

  document.getElementById('eventTitle').value = '';
  document.getElementById('eventStart').value = dayStr + 'T09:00';
  document.getElementById('eventEnd').value = dayStr + 'T10:00';
  document.getElementById('eventDesc').value = '';
  state.selectedColor = EVENT_COLORS[0];
  renderColorPicker();

  const creator = localStorage.getItem('fc_creator');
  if (creator) document.getElementById('eventCreator').value = creator;

  document.getElementById('eventModal').classList.add('open');
  setTimeout(() => document.getElementById('eventTitle').focus(), 100);
}

function onWeekCellClick(dayStr, hour) {
  state.editingEvent = null;
  document.getElementById('modalTitle').textContent = 'New Event';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('btnSave').textContent = 'Save Event';

  const hStr = String(hour).padStart(2, '0');
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventStart').value = dayStr + 'T' + hStr + ':00';
  document.getElementById('eventEnd').value = dayStr + 'T' + String(hour + 1).padStart(2, '0') + ':00';
  document.getElementById('eventDesc').value = '';
  state.selectedColor = EVENT_COLORS[0];
  renderColorPicker();

  const creator = localStorage.getItem('fc_creator');
  if (creator) document.getElementById('eventCreator').value = creator;

  document.getElementById('eventModal').classList.add('open');
  setTimeout(() => document.getElementById('eventTitle').focus(), 100);
}

function onFabClick() {
  const today = new Date();
  const dayStr = dateStr(today);
  const now = new Date();
  const hour = now.getHours();
  const nextHour = Math.min(hour + 1, 23);
  const hStr = String(hour).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');

  state.editingEvent = null;
  document.getElementById('modalTitle').textContent = 'New Event';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('btnSave').textContent = 'Save Event';

  document.getElementById('eventTitle').value = '';
  document.getElementById('eventStart').value = dayStr + 'T' + hStr + ':' + min;
  document.getElementById('eventEnd').value = dayStr + 'T' + String(nextHour).padStart(2, '0') + ':' + min;
  document.getElementById('eventDesc').value = '';
  state.selectedColor = EVENT_COLORS[0];
  renderColorPicker();

  const creator = localStorage.getItem('fc_creator');
  if (creator) document.getElementById('eventCreator').value = creator;

  document.getElementById('eventModal').classList.add('open');
  setTimeout(() => document.getElementById('eventTitle').focus(), 100);
}

function editEvent(id) {
  const evt = state.familyEvents.find(e => e.id === id);
  if (!evt) return;
  state.editingEvent = evt;

  document.getElementById('modalTitle').textContent = 'Edit Event';
  document.getElementById('btnDelete').style.display = 'inline-flex';
  document.getElementById('btnSave').textContent = 'Update Event';

  document.getElementById('eventTitle').value = evt.title;
  document.getElementById('eventStart').value = toLocalInput(new Date(evt.start_time));
  document.getElementById('eventEnd').value = toLocalInput(new Date(evt.end_time));
  document.getElementById('eventDesc').value = evt.description || '';
  document.getElementById('eventCreator').value = evt.created_by || '';
  state.selectedColor = evt.color || EVENT_COLORS[0];
  renderColorPicker();

  document.getElementById('eventModal').classList.add('open');
}

function closeEventModal() {
  document.getElementById('eventModal').classList.remove('open');
  state.editingEvent = null;
}

async function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const startVal = document.getElementById('eventStart').value;
  const endVal = document.getElementById('eventEnd').value;
  const desc = document.getElementById('eventDesc').value.trim();
  const creator = document.getElementById('eventCreator').value.trim();

  if (!title) { toast('Please enter a title'); return; }
  if (!startVal || !endVal) { toast('Please set start and end times'); return; }
  if (new Date(endVal) <= new Date(startVal)) { toast('End must be after start'); return; }

  localStorage.setItem('fc_creator', creator);

  const payload = {
    title,
    start_time: new Date(startVal).toISOString(),
    end_time: new Date(endVal).toISOString(),
    color: state.selectedColor,
    description: desc,
    created_by: creator || (currentUser?.email?.split('@')[0] || 'User'),
  };

  if (state.editingEvent) {
    payload.id = state.editingEvent.id;
  }

  const saved = await supabaseUpsert(payload);
  if (saved) {
    toast(state.editingEvent ? 'Event updated' : 'Event created');
    closeEventModal();
    await fetchFamilyEvents();
    render();
  }
}

async function deleteEvent() {
  if (!state.editingEvent) return;
  if (!confirm('Delete this event?')) return;
  await supabaseDelete(state.editingEvent.id);
  toast('Event deleted');
  closeEventModal();
  await fetchFamilyEvents();
  render();
}

function toLocalInput(d) {
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
    'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

/* ================================================================
   COLOR PICKER
   ================================================================ */
function renderColorPicker() {
  const el = document.getElementById('colorPicker');
  el.innerHTML = EVENT_COLORS.map(c =>
    `<div class="color-swatch${c === state.selectedColor ? ' selected' : ''}"
      style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c) {
  state.selectedColor = c;
  renderColorPicker();
}

/* ================================================================
   TOAST
   ================================================================ */
function toast(msg) {
  const container = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => { t.remove(); }, 3000);
}

/* ================================================================
   SWIPE GESTURE SUPPORT
   ================================================================ */
let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 2) {
    if (document.getElementById('eventModal').classList.contains('open')) return;
    if (document.getElementById('settingsPanel').classList.contains('open')) return;
    navigateMonth(dx < 0 ? 1 : -1);
  }
}, { passive: true });

/* ================================================================
   KEYBOARD NAV
   ================================================================ */
document.addEventListener('keydown', e => {
  if (document.getElementById('eventModal').classList.contains('open')) {
    if (e.key === 'Escape') closeEventModal();
    return;
  }
  if (document.getElementById('settingsPanel').classList.contains('open')) {
    if (e.key === 'Escape') closeSettings();
    return;
  }
  if (e.key === 'ArrowLeft') navigateMonth(-1);
  if (e.key === 'ArrowRight') navigateMonth(1);
  if (e.key === 't' || e.key === 'T') goToday();
});
</script>
