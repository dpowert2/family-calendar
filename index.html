<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Family Calendar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   CSS RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FDF6EE;
  --surface: #FFFFFF;
  --surface-hover: #FFF8F0;
  --border: #E8DDD0;
  --border-light: #F0E8DC;
  --text: #3D3229;
  --text-secondary: #8A7968;
  --text-muted: #B5A898;
  --accent: #4A90D9;
  --accent-light: #E8F0FB;
  --accent-dark: #3570B0;
  --busy: #B0B8C4;
  --busy-bg: #E8ECF0;
  --today-bg: #FFF3E0;
  --today-border: #FF9800;
  --danger: #E74C3C;
  --danger-light: #FDEDEC;
  --success: #27AE60;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --touch-min: 44px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --transition: 0.2s ease;
  --david-color: #4A90D9;
  --roselle-color: #E84393;
}

html, body {
  height: 100%; width: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-y;
}

button {
  font-family: var(--font);
  cursor: pointer;
  border: none;
  background: none;
  font-size: inherit;
  color: inherit;
  -webkit-tap-highlight-color: transparent;
}

input, select, textarea {
  font-family: var(--font);
  font-size: 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  background: var(--surface);
  color: var(--text);
  width: 100%;
  transition: border-color var(--transition);
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}

/* ============================================================
   PIN SCREEN
   ============================================================ */
#pinScreen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  width: 100vw;
  background: var(--bg);
}

.pin-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 40px 36px;
  width: min(340px, 90vw);
  text-align: center;
}

.pin-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 6px;
}

.pin-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

.pin-dots {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 28px;
}

.pin-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  transition: all var(--transition);
}

.pin-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
}

.pin-dot.error {
  background: var(--danger);
  border-color: var(--danger);
  animation: pinShake 0.4s;
}

@keyframes pinShake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 260px;
  margin: 0 auto;
}

.numpad-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  font-size: 28px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  transition: all var(--transition);
  background: var(--bg);
  color: var(--text);
}

.numpad-btn:hover { background: var(--border-light); }
.numpad-btn:active { transform: scale(0.92); background: var(--border); }

.numpad-btn.empty { visibility: hidden; }

.numpad-btn.backspace {
  font-size: 20px;
  background: transparent;
}

.pin-error-msg {
  color: var(--danger);
  font-size: 13px;
  font-weight: 600;
  margin-top: 16px;
  min-height: 20px;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  display: none;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
}

#app.visible {
  display: flex;
}

/* ---------- Header ---------- */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  z-index: 10;
  gap: 12px;
  flex-wrap: wrap;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-title {
  font-size: clamp(16px, 2.5vw, 22px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
  white-space: nowrap;
}
.header-date {
  font-size: clamp(12px, 1.5vw, 15px);
  color: var(--text-secondary);
  font-weight: 500;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: var(--touch-min);
  min-height: var(--touch-min);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  padding: 8px 14px;
  transition: all var(--transition);
}
.nav-btn:hover { background: var(--surface-hover); }
.nav-btn:active { transform: scale(0.96); }
.nav-btn.primary {
  background: var(--accent);
  color: #fff;
}
.nav-btn.primary:hover { background: var(--accent-dark); }

.nav-arrow {
  font-size: 18px;
  padding: 8px 10px;
  min-width: 38px;
}
.month-label {
  font-size: clamp(14px, 2vw, 20px);
  font-weight: 700;
  min-width: 0;
  text-align: center;
  white-space: nowrap;
}

.view-toggle {
  display: flex;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}
.view-toggle button {
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  transition: all var(--transition);
}
.view-toggle button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* ---------- Filter Checkboxes ---------- */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 14px;
}

.filter-check {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  user-select: none;
  white-space: nowrap;
}

.filter-check input[type="checkbox"] {
  width: 18px;
  height: 18px;
  min-width: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  padding: 0;
  border: none;
}

.filter-check .filter-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.clock {
  font-size: clamp(18px, 3vw, 28px);
  font-weight: 300;
  color: var(--text);
  letter-spacing: 1px;
  font-variant-numeric: tabular-nums;
  min-width: 70px;
  text-align: right;
}

.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  flex-shrink: 0;
}
.user-avatar:hover { background: var(--accent-dark); }

/* ---------- Calendar Grid ---------- */
.app-layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.calendar-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.calendar-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 8px clamp(6px, 1.5vw, 16px) 6px;
  overflow: hidden;
}
.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 3px;
}
.weekday-cell {
  text-align: center;
  font-size: clamp(10px, 1.2vw, 12px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  padding: 3px 0;
}
.month-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 3px;
}
.day-cell {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: clamp(3px, 0.5vw, 6px) clamp(4px, 0.7vw, 8px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: all var(--transition);
  border: 2px solid transparent;
  position: relative;
}
.day-cell:hover { border-color: var(--accent-light); box-shadow: var(--shadow-sm); }
.day-cell.other-month {
  background: transparent;
  opacity: 0.35;
}
.day-cell.today {
  background: var(--today-bg);
  border-color: var(--today-border);
  box-shadow: 0 0 0 1px var(--today-border);
}
.day-number {
  font-size: clamp(11px, 1.5vw, 15px);
  font-weight: 700;
  margin-bottom: 2px;
  color: var(--text);
}
.day-cell.today .day-number {
  color: var(--today-border);
}
.day-events {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.event-chip {
  font-size: clamp(9px, 1vw, 11px);
  font-weight: 600;
  padding: 1px 4px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
  line-height: 1.4;
  cursor: pointer;
}
.event-chip:active { opacity: 0.8; }
.event-chip.busy {
  background: var(--busy-bg);
  color: var(--busy);
  font-style: italic;
  font-weight: 500;
}
.event-more {
  font-size: clamp(9px, 0.9vw, 10px);
  color: var(--accent);
  font-weight: 600;
  padding-top: 1px;
  cursor: pointer;
}
.event-more:hover { text-decoration: underline; }

/* ---------- Upcoming Sidebar ---------- */
.upcoming-sidebar {
  width: clamp(260px, 25vw, 340px);
  min-width: 260px;
  background: var(--surface);
  border-left: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.upcoming-header {
  padding: 14px 18px 10px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.upcoming-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.upcoming-list::-webkit-scrollbar { width: 5px; }
.upcoming-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.upcoming-date-header {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  padding: 10px 18px 4px;
}
.upcoming-date-header.today-header {
  color: var(--today-border);
}
.upcoming-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 18px;
  transition: background var(--transition);
}
.upcoming-item:hover { background: var(--surface-hover); }
.upcoming-color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 4px;
  flex-shrink: 0;
}
.upcoming-item-content {
  flex: 1;
  min-width: 0;
}
.upcoming-item-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.upcoming-item-time {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 1px;
}
.upcoming-item-creator {
  font-size: 11px;
  color: var(--text-muted);
}
.upcoming-empty {
  padding: 24px 18px;
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
}

/* ---------- Week View ---------- */
.week-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 50px repeat(7, 1fr);
  overflow-y: auto;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.week-grid::-webkit-scrollbar { width: 6px; }
.week-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.week-header-spacer {
  grid-column: 1;
  grid-row: 1;
  background: var(--surface);
  z-index: 2;
}
.week-header-cell {
  grid-row: 1;
  z-index: 2;
  background: var(--surface);
  text-align: center;
  padding: 8px 2px;
  font-size: 12px;
  font-weight: 700;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-secondary);
}
.week-header-cell.today-col { color: var(--today-border); }
.week-header-cell .day-num {
  display: block;
  font-size: clamp(16px, 2vw, 22px);
  font-weight: 700;
  color: var(--text);
}
.week-header-cell.today-col .day-num { color: var(--today-border); }
.time-label {
  font-size: 10px;
  color: var(--text-muted);
  text-align: right;
  padding: 0 6px;
  border-right: 1px solid var(--border-light);
  height: 60px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding-top: 2px;
}
.week-col-cell {
  height: 60px;
  border-bottom: 1px solid var(--border-light);
  border-right: 1px solid var(--border-light);
  position: relative;
  cursor: pointer;
}
.week-col-cell:hover { background: var(--surface-hover); }
.week-col-cell.today-col { background: #FFFAF0; }

.week-event {
  position: absolute;
  border-radius: 4px;
  padding: 2px 5px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  overflow: hidden;
  z-index: 1;
  cursor: pointer;
  line-height: 1.3;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.week-event.busy {
  background: var(--busy-bg);
  color: var(--busy);
  font-style: italic;
  font-weight: 500;
}

/* All-day events banner row in week view */
.week-allday-spacer {
  grid-row: 2;
  grid-column: 1;
  border-right: 1px solid var(--border-light);
  border-bottom: 2px solid var(--border);
  padding: 4px 6px;
  font-size: 9px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 2;
}
.week-allday-cell {
  grid-row: 2;
  border-bottom: 2px solid var(--border);
  border-right: 1px solid var(--border-light);
  padding: 4px 3px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 2;
}
.allday-chip {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 6px;
  border-radius: 4px;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  line-height: 1.3;
}
.allday-chip.busy {
  background: var(--busy-bg);
  color: var(--busy);
  font-style: italic;
}

.now-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--danger);
  z-index: 3;
  pointer-events: none;
}
.now-line::before {
  content: '';
  position: absolute;
  left: -4px; top: -4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--danger);
}

/* ============================================================
   MODAL / OVERLAY
   ============================================================ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s;
  padding: 16px;
}
.modal-overlay.open { display: flex; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: min(500px, 100%);
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.25s;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 10px;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
}
.modal-close {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--text-muted);
  transition: all var(--transition);
}
.modal-close:hover { background: var(--bg); color: var(--text); }

.modal-body { padding: 8px 20px 20px; }

.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.color-picker {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.color-swatch {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); box-shadow: var(--shadow-md); }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  padding-top: 8px;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: var(--touch-min);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  transition: all var(--transition);
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #C0392B; }
.btn-ghost { color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg); }

/* ---------- Settings/User Panel ---------- */
.settings-panel {
  display: none;
  position: fixed;
  top: 0; right: 0;
  width: min(420px, 100vw);
  height: 100vh;
  background: var(--surface);
  box-shadow: var(--shadow-lg);
  z-index: 200;
  flex-direction: column;
  animation: slideIn 0.25s;
}
.settings-panel.open { display: flex; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-light);
}
.settings-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.settings-section { margin-bottom: 28px; }
.settings-section-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.settings-note {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 6px;
  line-height: 1.4;
}
.settings-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ---------- Floating Action Button ---------- */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(74,144,217,0.4);
  z-index: 50;
  transition: all var(--transition);
  cursor: pointer;
  border: none;
  line-height: 1;
}
.fab:hover { background: var(--accent-dark); transform: scale(1.08); }
.fab:active { transform: scale(0.95); }

/* ---------- Toast ---------- */
.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;

<!-- TOAST -->

<script>
/* ================================================================
   CONSTANTS
   ================================================================ */
const PIN_CODE = '990627';
const FAMILY_MEMBERS = ['David', 'Roselle'];

/* ================================================================
   SUPABASE CONFIGURATION
   ================================================================ */
const SUPABASE_URL = '__SUPABASE_URL__';
const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';

let sb = null;

function initSupabase() {
  try {
    if (SUPABASE_URL && !SUPABASE_URL.startsWith('__') && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith('__') && window.supabase) {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch (e) {
    console.error('Failed to initialize Supabase:', e);
  }
}

/* ================================================================
   STATE
   ================================================================ */
const EVENT_COLORS = [
  '#4A90D9','#E67E22','#27AE60','#9B59B6',
  '#E74C3C','#1ABC9C','#F39C12','#8E44AD',
  '#2ECC71','#E84393','#00B894','#6C5CE7'
];

let state = {
  view: 'month',
  currentDate: new Date(),
  familyEvents: [],
  workEventsDavid: [],
  workEventsRoselle: [],
  editingEvent: null,
  selectedColor: EVENT_COLORS[0],
  icsPath: 'calendar.ics',
  icsPathRoselle: 'calendar-roselle.ics',
  refreshMin: 5,
  filterDavid: true,
  filterRoselle: true,
};

let refreshTimer = null;

/* ================================================================
   PIN GATE
   ================================================================ */
let pinEntry = '';

function pinPress(digit) {
  if (pinEntry.length >= 6) return;
  pinEntry += digit;
  updatePinDots();
  if (pinEntry.length === 6) {
    setTimeout(checkPin, 150);
  }
}

function pinBackspace() {
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
  document.getElementById('pinError').textContent = '';
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach(d => d.classList.remove('error'));
}

function updatePinDots() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('filled', i < pinEntry.length);
  });
}

function checkPin() {
  if (pinEntry === PIN_CODE) {
    localStorage.setItem('fc_authed', 'yes');
    enterApp();
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN';
    const dots = document.querySelectorAll('.pin-dot');
    dots.forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
    setTimeout(() => {
      dots.forEach(d => d.classList.remove('error'));
      pinEntry = '';
      updatePinDots();
      document.getElementById('pinError').textContent = '';
    }, 800);
  }
}

function enterApp() {
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('fabAdd').style.display = '';
  initSupabase();
  initApp();
}

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('fc_authed') === 'yes') {
    enterApp();
  }
});

function initApp() {
  loadSettings();
  renderColorPicker();
  updateClock();
  setInterval(updateClock, 1000);
  render();
  refreshData();
  scheduleRefresh();
  // Set default creator from localStorage
  const lastCreator = localStorage.getItem('fc_creator');
  if (lastCreator && FAMILY_MEMBERS.includes(lastCreator)) {
    document.getElementById('eventCreator').value = lastCreator;
  }
}

/* ================================================================
   FILTER
   ================================================================ */
function onFilterChange() {
  state.filterDavid = document.getElementById('filterDavid').checked;
  state.filterRoselle = document.getElementById('filterRoselle').checked;
  render();
}

/* ================================================================
   SETTINGS / PERSISTENCE
   ================================================================ */
function loadSettings() {
  const s = localStorage.getItem('fc_settings');
  if (s) {
    try {
      const p = JSON.parse(s);
      state.icsPath = p.icsPath || 'calendar.ics';
      state.icsPathRoselle = p.icsPathRoselle || 'calendar-roselle.ics';
      state.refreshMin = p.refreshMin || 5;
    } catch(e) {}
  }
}

function saveSettings() {
  state.icsPath = document.getElementById('settIcsPath').value.trim() || 'calendar.ics';
  state.icsPathRoselle = document.getElementById('settIcsPathRoselle').value.trim() || 'calendar-roselle.ics';
  state.refreshMin = parseInt(document.getElementById('settRefresh').value) || 5;

  localStorage.setItem('fc_settings', JSON.stringify({
    icsPath: state.icsPath,
    icsPathRoselle: state.icsPathRoselle,
    refreshMin: state.refreshMin,
  }));

  closeSettings();
  refreshData();
  scheduleRefresh();
  toast('Settings saved');
}

function openSettings() {
  document.getElementById('settIcsPath').value = state.icsPath;
  document.getElementById('settIcsPathRoselle').value = state.icsPathRoselle;
  document.getElementById('settRefresh').value = state.refreshMin;
  document.getElementById('settingsPanel').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
}

/* ================================================================
   DATA FETCHING
   ================================================================ */
async function refreshData() {
  await Promise.all([
    fetchFamilyEvents(),
    fetchWorkCalendar('david'),
    fetchWorkCalendar('roselle'),
  ]);
  render();
}

function scheduleRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshData, state.refreshMin * 60 * 1000);
}

/* ----- Supabase Family Events ----- */
async function fetchFamilyEvents() {
  if (!sb) return;
  try {
    const { data, error } = await sb
      .from('events')
      .select('*')
      .order('start_time', { ascending: true });
    if (error) throw error;
    state.familyEvents = data || [];
  } catch(e) {
    console.error('Supabase fetch error:', e);
  }
}

async function supabaseUpsert(evt) {
  if (!sb) { toast('Supabase not configured'); return null; }
  const isNew = !evt.id;
  const body = {
    title: evt.title,
    start_time: evt.start_time,
    end_time: evt.end_time,
    color: evt.color,
    description: evt.description || '',
    created_by: evt.created_by || '',
    recurrence_rule: evt.recurrence_rule || null,
    recurrence_end: evt.recurrence_end || null,
  };
  try {
    let result;
    if (isNew) {
      const { data, error } = await sb.from('events').insert([body]).select();
      if (error) throw error;
      result = data[0];
    } else {
      const { data, error } = await sb.from('events').update(body).eq('id', evt.id).select();
      if (error) throw error;
      result = data[0];
    }
    return result;
  } catch(e) {
    console.error('Supabase upsert error:', e);
    toast('Error saving event');
    return null;
  }
}

async function supabaseDelete(id) {
  if (!sb) return;
  try {
    const { error } = await sb.from('events').delete().eq('id', id);
    if (error) throw error;
  } catch(e) {
    console.error('Supabase delete error:', e);
    toast('Error deleting event');
  }
}

/* ----- ICS Work Calendars ----- */
async function fetchWorkCalendar(who) {
  const path = who === 'roselle' ? state.icsPathRoselle : state.icsPath;
  try {
    const res = await fetch(path + '?t=' + Date.now());
    if (!res.ok) return;
    const text = await res.text();
    const events = parseICS(text, who);
    if (who === 'roselle') {
      state.workEventsRoselle = events;
    } else {
      state.workEventsDavid = events;
    }
  } catch(e) {
    // silently fail — file may not exist yet
  }
}

function parseICS(text, owner) {
  const events = [];
  const lines = text.replace(/\r\n /g, '').replace(/\r/g, '\n').split('\n');
  let evt = null;
  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') { evt = {}; continue; }
    if (line === 'END:VEVENT' && evt) {
      if (evt.start && evt.end) {
        events.push({ title: 'Busy', start: evt.start, end: evt.end, isBusy: true, owner: owner || 'david' });
      }
      evt = null;
      continue;
    }
    if (!evt) continue;
    if (line.startsWith('DTSTART')) {
      evt.start = parseICSDate(line);
    } else if (line.startsWith('DTEND')) {
      evt.end = parseICSDate(line);
    }
  }
  return mergeAdjacentBusy(events);
}

/* Merge adjacent or overlapping busy blocks into single spans */
function mergeAdjacentBusy(events) {
  if (events.length <= 1) return events;
  // Separate all-day from timed
  const allDay = events.filter(e => {
    const s = e.start, en = e.end;
    return s.getHours() === 0 && s.getMinutes() === 0 && en.getHours() === 0 && en.getMinutes() === 0 && en > s;
  });
  const timed = events.filter(e => !allDay.includes(e));

  // Sort timed by start
  timed.sort((a, b) => a.start - b.start);
  const merged = [];
  for (const e of timed) {
    if (merged.length === 0) { merged.push({ ...e }); continue; }
    const last = merged[merged.length - 1];
    // Merge if starts within 5 min of previous end (covers adjacent + slight overlap)
    if (e.start.getTime() <= last.end.getTime() + 5 * 60000) {
      last.end = new Date(Math.max(last.end.getTime(), e.end.getTime()));
    } else {
      merged.push({ ...e });
    }
  }

  // Merge all-day blocks too
  allDay.sort((a, b) => a.start - b.start);
  const mergedAllDay = [];
  for (const e of allDay) {
    if (mergedAllDay.length === 0) { mergedAllDay.push({ ...e }); continue; }
    const last = mergedAllDay[mergedAllDay.length - 1];
    if (e.start.getTime() <= last.end.getTime()) {
      last.end = new Date(Math.max(last.end.getTime(), e.end.getTime()));
    } else {
      mergedAllDay.push({ ...e });
    }
  }

  return [...mergedAllDay, ...merged];
}

function parseICSDate(line) {
  const val = line.split(':').pop();
  if (!val) return null;
  if (val.length === 8) {
    return new Date(val.slice(0,4) + '-' + val.slice(4,6) + '-' + val.slice(6,8));
  }
  const y = val.slice(0,4), mo = val.slice(4,6), d = val.slice(6,8);
  const h = val.slice(9,11), mi = val.slice(11,13), s = val.slice(13,15);
  const iso = `${y}-${mo}-${d}T${h}:${mi}:${s}` + (val.endsWith('Z') ? 'Z' : '');
  return new Date(iso);
}

/* ================================================================
   CLOCK
   ================================================================ */
function updateClock() {
  const now = new Date();
  const clockEl = document.getElementById('clock');
  if (clockEl) clockEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const dateEl = document.getElementById('headerDate');
  if (dateEl) dateEl.textContent = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

/* ================================================================
   NAVIGATION
   ================================================================ */
function navigateMonth(dir) {
  if (state.view === 'month') {
    state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + dir, 1);
  } else {
    const d = new Date(state.currentDate);
    d.setDate(d.getDate() + dir * 7);
    state.currentDate = d;
  }
  render();
}

function goToday() {
  state.currentDate = new Date();
  render();
}

function setView(v) {
  state.view = v;
  document.getElementById('btnMonth').classList.toggle('active', v === 'month');
  document.getElementById('btnWeek').classList.toggle('active', v === 'week');
  render();
}

/* ================================================================
   RENDERING — MONTH VIEW
   ================================================================ */
function render() {
  const body = document.getElementById('calendarBody');
  if (state.view === 'month') {
    renderMonth(body);
  } else {
    renderWeek(body);
  }
  updateMonthLabel();
  renderUpcoming();
}

function updateMonthLabel() {
  const d = state.currentDate;
  if (state.view === 'month') {
    document.getElementById('monthLabel').textContent =
      d.toLocaleDateString([], { month: 'long', year: 'numeric' });
  } else {
    const start = getWeekStart(d);
    const end = new Date(start); end.setDate(end.getDate() + 6);
    const fmt = { month: 'short', day: 'numeric' };
    document.getElementById('monthLabel').textContent =
      start.toLocaleDateString([], fmt) + ' — ' + end.toLocaleDateString([], { ...fmt, year: 'numeric' });
  }
}

function renderMonth(container) {
  const today = new Date();
  const year = state.currentDate.getFullYear();
  const month = state.currentDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = (firstDay.getDay() + 6) % 7;
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - startOffset);

  let html = '<div class="weekday-row">';
  for (const d of ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']) {
    html += `<div class="weekday-cell">${d}</div>`;
  }
  html += '</div><div class="month-grid">';

  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    const isOther = d.getMonth() !== month;
    const isToday = sameDay(d, today);
    const dayStr = dateStr(d);
    const evts = getEventsForDay(d);

    html += `<div class="day-cell${isOther ? ' other-month' : ''}${isToday ? ' today' : ''}" data-date="${dayStr}">`;
    html += `<div class="day-number">${d.getDate()}</div>`;
    html += '<div class="day-events">';

    const maxShow = 3;
    for (let j = 0; j < Math.min(evts.length, maxShow); j++) {
      const e = evts[j];
      const allDay = isAllDayEvent(e);
      if (e.isBusy) {
        const ownerLabel = e.owner === 'roselle' ? 'R' : 'D';
        if (allDay) {
          html += `<div class="event-chip busy">${ownerLabel} Busy</div>`;
        } else {
          const t = formatTime(e.start) + '–' + formatTime(e.end);
          html += `<div class="event-chip busy">${t} ${ownerLabel} Busy</div>`;
        }
      } else {
        const who = e.created_by ? ' · ' + esc(e.created_by) : '';
        if (allDay) {
          html += `<div class="event-chip" style="background:${e.color || '#4A90D9'}"
                    onclick="editEvent('${e.id}')">${esc(e.title)}${who}</div>`;
        } else {
          const t = formatTime(new Date(e.start_time));
          html += `<div class="event-chip" style="background:${e.color || '#4A90D9'}"
                    onclick="editEvent('${e.id}')">${t} ${esc(e.title)}${who}</div>`;
        }
      }
    }
    if (evts.length > maxShow) {
      html += `<div class="event-more" onclick="showDayView('${dayStr}')">+${evts.length - maxShow} more</div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

/* ================================================================
   RENDERING — WEEK VIEW
   ================================================================ */
function renderWeek(container) {
  const today = new Date();
  const weekStart = getWeekStart(state.currentDate);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  let html = '<div class="week-grid" id="weekGrid">';
  html += '<div class="week-header-spacer"></div>';
  for (const d of days) {
    const isToday = sameDay(d, today);
    const dayName = d.toLocaleDateString([], { weekday: 'short' });
    html += `<div class="week-header-cell${isToday ? ' today-col' : ''}">
      ${dayName}<span class="day-num">${d.getDate()}</span></div>`;
  }

  // All-day row — consolidate busy per owner into one chip per day
  html += '<div class="week-allday-spacer">All day</div>';
  for (const d of days) {
    const evts = getEventsForDay(d).filter(e => isAllDayEvent(e));
    html += '<div class="week-allday-cell">';

    // Group busy by owner, show one chip per owner
    const busyOwners = new Set();
    for (const e of evts) {
      if (e.isBusy) {
        busyOwners.add(e.owner || 'david');
      } else {
        const who = e.created_by ? ' · ' + esc(e.created_by) : '';
        html += `<div class="allday-chip" style="background:${e.color || '#4A90D9'}"
                  onclick="editEvent('${e._originalId || e.id}')">${esc(e.title)}${who}</div>`;
      }
    }
    for (const owner of busyOwners) {
      const label = owner === 'roselle' ? 'R' : 'D';
      html += `<div class="allday-chip busy">${label} Busy</div>`;
    }

    html += '</div>';
  }

  for (let h = 6; h <= 22; h++) {
    const label = h === 0 ? '12 AM' : h < 12 ? h + ' AM' : h === 12 ? '12 PM' : (h - 12) + ' PM';
    html += `<div class="time-label">${label}</div>`;
    for (let di = 0; di < 7; di++) {
      const d = days[di];
      const isToday = sameDay(d, today);
      const dStr = dateStr(d);
      html += `<div class="week-col-cell${isToday ? ' today-col' : ''}" data-date="${dStr}" data-hour="${h}"
                onclick="onWeekCellClick('${dStr}',${h})"></div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;

  const grid = document.getElementById('weekGrid');
  const gridRect = grid.getBoundingClientRect();

  for (const d of days) {
    const evts = getEventsForDay(d).filter(e => !isAllDayEvent(e));
    if (evts.length === 0) continue;

    // Get cell rect for this day column
    const refCell = grid.querySelector(`.week-col-cell[data-date="${dateStr(d)}"][data-hour="6"]`);
    if (!refCell) continue;
    const cellRect = refCell.getBoundingClientRect();
    const colLeft = cellRect.left - gridRect.left;
    const colWidth = cellRect.width;

    // Build layout items with collision detection
    const items = [];
    for (const e of evts) {
      const start = e.isBusy ? e.start : new Date(e.start_time);
      const end = e.isBusy ? e.end : new Date(e.end_time);
      const startH = start.getHours() + start.getMinutes() / 60;
      const endH = end.getHours() + end.getMinutes() / 60;
      if (endH <= 6 || startH >= 23) continue;
      items.push({ e, start, end, startH: Math.max(startH, 6), endH: Math.min(endH, 23) });
    }

    // Assign columns for overlapping events
    const columns = [];
    for (const item of items) {
      let placed = false;
      for (let c = 0; c < columns.length; c++) {
        const lastInCol = columns[c][columns[c].length - 1];
        if (item.startH >= lastInCol.endH - 0.01) {
          columns[c].push(item);
          item.col = c;
          placed = true;
          break;
        }
      }
      if (!placed) {
        item.col = columns.length;
        columns.push([item]);
      }
    }
    const numCols = columns.length;

    // Render
    for (const item of items) {
      const { e, start, end, startH, endH } = item;
      const height = Math.max(15, (endH - startH) * 60);

      const hourCell = grid.querySelector(`.week-col-cell[data-date="${dateStr(d)}"][data-hour="${Math.floor(startH)}"]`);
      if (!hourCell) continue;
      const hCellRect = hourCell.getBoundingClientRect();
      const cellTop = hCellRect.top - gridRect.top + grid.scrollTop;
      const minuteOffset = (startH - Math.floor(startH)) * 60;

      const div = document.createElement('div');
      div.className = 'week-event' + (e.isBusy ? ' busy' : '');
      if (!e.isBusy) {
        div.style.background = e.color || '#4A90D9';
        const who = e.created_by ? ' · ' + e.created_by : '';
        div.textContent = formatTime(start) + ' ' + e.title + who;
        div.onclick = () => editEvent(e._originalId || e.id);
      } else {
        const ownerLabel = e.owner === 'roselle' ? 'R' : 'D';
        div.textContent = formatTime(start) + '–' + formatTime(end) + ' ' + ownerLabel;
      }

      const slotWidth = (colWidth - 6) / numCols;
      div.style.position = 'absolute';
      div.style.top = (cellTop + minuteOffset) + 'px';
      div.style.height = height + 'px';
      div.style.left = (colLeft + 3 + item.col * slotWidth) + 'px';
      div.style.width = (slotWidth - 2) + 'px';
      grid.appendChild(div);
    }
  }

  // Now line
  if (days.some(d => sameDay(d, today))) {
    const now = new Date();
    const h = now.getHours() + now.getMinutes() / 60;
    if (h >= 6 && h <= 23) {
      const cell = grid.querySelector(`.week-col-cell.today-col[data-hour="${Math.floor(h)}"]`);
      if (cell) {
        const gridRect = grid.getBoundingClientRect();
        const cellRect = cell.getBoundingClientRect();
        const top = cellRect.top - gridRect.top + grid.scrollTop + (h - Math.floor(h)) * 60;
        const line = document.createElement('div');
        line.className = 'now-line';
        line.style.position = 'absolute';
        line.style.top = top + 'px';
        const firstColCell = grid.querySelector('.week-col-cell[data-hour="6"]');
        if (firstColCell) {
          const firstRect = firstColCell.getBoundingClientRect();
          line.style.left = (firstRect.left - gridRect.left) + 'px';
          line.style.right = '0';
        }
        grid.appendChild(line);
      }
    }
  }

  requestAnimationFrame(() => {
    const g = document.getElementById('weekGrid');
    if (g) g.scrollTop = 2 * 60;
  });
}

/* ================================================================
   EVENT HELPERS
   ================================================================ */
/* Expand recurring events into virtual occurrences for a date range */
function expandRecurringEvents(events, rangeStart, rangeEnd) {
  const result = [];
  for (const e of events) {
    const s = new Date(e.start_time);
    const en = new Date(e.end_time);
    const duration = en - s;

    if (!e.recurrence_rule) {
      // Non-recurring: include if overlaps range
      if (s < rangeEnd && en > rangeStart) result.push(e);
      continue;
    }

    const rule = e.recurrence_rule;
    const recEnd = e.recurrence_end ? new Date(e.recurrence_end + 'T23:59:59') : new Date(rangeEnd.getTime() + 365 * 86400000);
    const limit = Math.min(rangeEnd.getTime(), recEnd.getTime());
    let cur = new Date(s);
    let count = 0;
    const maxOccurrences = 500;

    while (cur.getTime() < limit && count < maxOccurrences) {
      const occEnd = new Date(cur.getTime() + duration);
      if (occEnd > rangeStart && cur < rangeEnd) {
        result.push({
          ...e,
          start_time: cur.toISOString(),
          end_time: occEnd.toISOString(),
          _recurring: true,
          _originalId: e.id,
        });
      }
      // Advance to next occurrence
      const prev = new Date(cur);
      if (rule === 'daily') {
        cur.setDate(cur.getDate() + 1);
      } else if (rule === 'weekly') {
        cur.setDate(cur.getDate() + 7);
      } else if (rule === 'fortnightly') {
        cur.setDate(cur.getDate() + 14);
      } else if (rule === 'monthly') {
        cur.setMonth(cur.getMonth() + 1);
      } else if (rule === 'yearly') {
        cur.setFullYear(cur.getFullYear() + 1);
      } else {
        break;
      }
      if (cur.getTime() <= prev.getTime()) break; // safety
      count++;
    }
  }
  return result;
}

function getEventsForDay(d) {
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dayEnd = new Date(dayStart);
  dayEnd.setDate(dayEnd.getDate() + 1);

  const expanded = expandRecurringEvents(state.familyEvents, dayStart, dayEnd);
  let family = expanded.filter(e => {
    const s = new Date(e.start_time);
    const en = new Date(e.end_time);
    return s < dayEnd && en > dayStart;
  });

  // Apply filter to family events
  family = family.filter(e => {
    const creator = (e.created_by || '').toLowerCase();
    if (creator === 'david' && !state.filterDavid) return false;
    if (creator === 'roselle' && !state.filterRoselle) return false;
    return true;
  });

  let workD = [];
  if (state.filterDavid) {
    workD = state.workEventsDavid.filter(e => e.start < dayEnd && e.end > dayStart);
  }

  let workR = [];
  if (state.filterRoselle) {
    workR = state.workEventsRoselle.filter(e => e.start < dayEnd && e.end > dayStart);
  }

  return [...family, ...workD, ...workR].sort((a, b) => {
    const sa = a.isBusy ? a.start : new Date(a.start_time);
    const sbb = b.isBusy ? b.start : new Date(b.start_time);
    return sa - sbb;
  });
}

function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function formatTime(d) {
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function getWeekStart(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  const start = new Date(d);
  start.setDate(d.getDate() + diff);
  start.setHours(0, 0, 0, 0);
  return start;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function isAllDayEvent(e) {
  if (e.isBusy) {
    const s = e.start, en = e.end;
    return (s.getHours() === 0 && s.getMinutes() === 0 && en.getHours() === 0 && en.getMinutes() === 0 && en > s);
  }
  const s = new Date(e.start_time), en = new Date(e.end_time);
  const durationH = (en - s) / (1000 * 60 * 60);
  if (durationH >= 23) return true;
  return (s.getHours() === 0 && s.getMinutes() === 0 && en.getHours() === 0 && en.getMinutes() === 0);
}

function toggleRecurrenceEnd() {
  const val = document.getElementById('eventRecurrence').value;
  document.getElementById('recurrenceEndGroup').style.display = val ? '' : 'none';
}

function toggleAllDay() {
  const checked = document.getElementById('eventAllDay').checked;
  document.getElementById('timeRow').style.display = checked ? 'none' : '';
  document.getElementById('dateRow').style.display = checked ? '' : 'none';

  if (checked) {
    // Copy current date values to date inputs
    const startVal = document.getElementById('eventStart').value;
    const endVal = document.getElementById('eventEnd').value;
    if (startVal) document.getElementById('eventStartDate').value = startVal.split('T')[0];
    if (endVal) document.getElementById('eventEndDate').value = endVal.split('T')[0];
  }
}

/* ================================================================
   EVENT MODAL
   ================================================================ */
function openNewEventModal(dayStr, hour) {
  state.editingEvent = null;
  document.getElementById('modalTitle').textContent = 'New Event';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('btnSave').textContent = 'Save Event';

  const hStr = hour !== undefined ? String(hour).padStart(2, '0') : '09';
  const endH = hour !== undefined ? String(Math.min(hour + 1, 23)).padStart(2, '0') : '10';
  const min = hour !== undefined ? '00' : '00';

  document.getElementById('eventTitle').value = '';
  document.getElementById('eventStart').value = dayStr + 'T' + hStr + ':' + min;
  document.getElementById('eventEnd').value = dayStr + 'T' + endH + ':' + min;
  document.getElementById('eventStartDate').value = dayStr;
  document.getElementById('eventEndDate').value = dayStr;
  document.getElementById('eventDesc').value = '';
  document.getElementById('eventAllDay').checked = false;
  document.getElementById('timeRow').style.display = '';
  document.getElementById('dateRow').style.display = 'none';
  document.getElementById('eventRecurrence').value = '';
  document.getElementById('eventRecurrenceEnd').value = '';
  document.getElementById('recurrenceEndGroup').style.display = 'none';
  state.selectedColor = EVENT_COLORS[0];
  renderColorPicker();

  const lastCreator = localStorage.getItem('fc_creator');
  if (lastCreator && FAMILY_MEMBERS.includes(lastCreator)) {
    document.getElementById('eventCreator').value = lastCreator;
  }

  document.getElementById('eventModal').classList.add('open');
  setTimeout(() => document.getElementById('eventTitle').focus(), 100);
}

function onWeekCellClick(dayStr, hour) {
  openNewEventModal(dayStr, hour);
}

function onFabClick() {
  const today = new Date();
  const dayStr = dateStr(today);
  const hour = today.getHours();
  openNewEventModal(dayStr, hour);
}

function editEvent(id) {
  const evt = state.familyEvents.find(e => e.id === id);
  if (!evt) return;
  state.editingEvent = evt;

  document.getElementById('modalTitle').textContent = 'Edit Event';
  document.getElementById('btnDelete').style.display = 'inline-flex';
  document.getElementById('btnSave').textContent = 'Update Event';

  document.getElementById('eventTitle').value = evt.title;
  const sDate = new Date(evt.start_time);
  const eDate = new Date(evt.end_time);
  document.getElementById('eventStart').value = toLocalInput(sDate);
  document.getElementById('eventEnd').value = toLocalInput(eDate);
  document.getElementById('eventDesc').value = evt.description || '';
  document.getElementById('eventCreator').value = evt.created_by || 'David';

  const allDay = isAllDayEvent(evt);
  document.getElementById('eventAllDay').checked = allDay;
  document.getElementById('timeRow').style.display = allDay ? 'none' : '';
  document.getElementById('dateRow').style.display = allDay ? '' : 'none';
  if (allDay) {
    document.getElementById('eventStartDate').value = dateStr(sDate);
    // For all-day, end date is exclusive in storage, so show the day before
    const endShow = new Date(eDate);
    endShow.setDate(endShow.getDate() - 1);
    document.getElementById('eventEndDate').value = dateStr(endShow.getTime() < sDate.getTime() ? sDate : endShow);
  }

  // Recurrence
  const srcEvt = evt._originalId ? state.familyEvents.find(e => e.id === evt._originalId) : evt;
  document.getElementById('eventRecurrence').value = (srcEvt || evt).recurrence_rule || '';
  document.getElementById('eventRecurrenceEnd').value = (srcEvt || evt).recurrence_end || '';
  document.getElementById('recurrenceEndGroup').style.display = (srcEvt || evt).recurrence_rule ? '' : 'none';

  state.selectedColor = evt.color || EVENT_COLORS[0];
  renderColorPicker();

  // For recurring virtual occurrences, edit the original
  if (evt._originalId) {
    state.editingEvent = srcEvt || evt;
  }

  document.getElementById('eventModal').classList.add('open');
}

function closeEventModal() {
  document.getElementById('eventModal').classList.remove('open');
  state.editingEvent = null;
}

async function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const isAllDay = document.getElementById('eventAllDay').checked;
  const desc = document.getElementById('eventDesc').value.trim();
  const creator = document.getElementById('eventCreator').value;

  if (!title) { toast('Please enter a title'); return; }

  let startISO, endISO;
  if (isAllDay) {
    const sd = document.getElementById('eventStartDate').value;
    const ed = document.getElementById('eventEndDate').value;
    if (!sd || !ed) { toast('Please set start and end dates'); return; }
    if (ed < sd) { toast('End date must be on or after start date'); return; }
    startISO = new Date(sd + 'T00:00:00').toISOString();
    // End date is exclusive (next day midnight) for proper all-day range
    const endD = new Date(ed + 'T00:00:00');
    endD.setDate(endD.getDate() + 1);
    endISO = endD.toISOString();
  } else {
    const startVal = document.getElementById('eventStart').value;
    const endVal = document.getElementById('eventEnd').value;
    if (!startVal || !endVal) { toast('Please set start and end times'); return; }
    if (new Date(endVal) <= new Date(startVal)) { toast('End must be after start'); return; }
    startISO = new Date(startVal).toISOString();
    endISO = new Date(endVal).toISOString();
  }

  localStorage.setItem('fc_creator', creator);

  const recRule = document.getElementById('eventRecurrence').value || null;
  const recEnd = document.getElementById('eventRecurrenceEnd').value || null;

  const payload = {
    title,
    start_time: startISO,
    end_time: endISO,
    color: state.selectedColor,
    description: desc,
    created_by: creator,
    recurrence_rule: recRule,
    recurrence_end: recEnd,
  };

  if (state.editingEvent) {
    payload.id = state.editingEvent.id;
  }

  const saved = await supabaseUpsert(payload);
  if (saved) {
    toast(state.editingEvent ? 'Event updated' : 'Event created');
    closeEventModal();
    await fetchFamilyEvents();
    render();
  }
}

async function deleteEvent() {
  if (!state.editingEvent) return;
  if (!confirm('Delete this event?')) return;
  await supabaseDelete(state.editingEvent.id);
  toast('Event deleted');
  closeEventModal();
  await fetchFamilyEvents();
  render();
}

function toLocalInput(d) {
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
    'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

/* ================================================================
   COLOR PICKER
   ================================================================ */
function renderColorPicker() {
  const el = document.getElementById('colorPicker');
  if (!el) return;
  el.innerHTML = EVENT_COLORS.map(c =>
    `<div class="color-swatch${c === state.selectedColor ? ' selected' : ''}"
      style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c) {
  state.selectedColor = c;
  renderColorPicker();
}

/* ================================================================
   TOAST
   ================================================================ */
function toast(msg) {
  const container = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => { t.remove(); }, 3000);
}

/* ================================================================
   SHOW DAY VIEW (from "+N more")
   ================================================================ */
function showDayView(dayStr) {
  state.currentDate = new Date(dayStr + 'T12:00:00');
  setView('week');
}

/* ================================================================
   UPCOMING SIDEBAR
   ================================================================ */
function renderUpcoming() {
  const list = document.getElementById('upcomingList');
  if (!list) return;

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const endRange = new Date(today);
  endRange.setDate(endRange.getDate() + 14);

  const allEvents = [];

  const expanded = expandRecurringEvents(state.familyEvents, today, endRange);
  for (const e of expanded) {
    const s = new Date(e.start_time);
    if (s >= today && s < endRange) {
      const creator = (e.created_by || '').toLowerCase();
      if (creator === 'david' && !state.filterDavid) continue;
      if (creator === 'roselle' && !state.filterRoselle) continue;
      allEvents.push({ title: e.title, start: s, end: new Date(e.end_time), color: e.color || '#4A90D9', creator: e.created_by, isBusy: false, id: e._originalId || e.id, recurrence_rule: e.recurrence_rule });
    }
  }

  if (state.filterDavid) {
    for (const e of state.workEventsDavid) {
      if (e.start >= today && e.start < endRange) {
        allEvents.push({ title: 'D Busy', start: e.start, end: e.end, color: null, isBusy: true, owner: 'david' });
      }
    }
  }

  if (state.filterRoselle) {
    for (const e of state.workEventsRoselle) {
      if (e.start >= today && e.start < endRange) {
        allEvents.push({ title: 'R Busy', start: e.start, end: e.end, color: null, isBusy: true, owner: 'roselle' });
      }
    }
  }

  allEvents.sort((a, b) => a.start - b.start);

  if (allEvents.length === 0) {
    list.innerHTML = '<div class="upcoming-empty">No upcoming events in the next 2 weeks</div>';
    return;
  }

  let html = '';
  let lastDateStr = '';
  const nowDate = new Date();
  nowDate.setHours(0, 0, 0, 0);

  for (const e of allEvents) {
    const dStr = dateStr(e.start);
    if (dStr !== lastDateStr) {
      const d = new Date(e.start);
      d.setHours(0, 0, 0, 0);
      const isToday = sameDay(d, nowDate);
      const isTomorrow = sameDay(d, new Date(nowDate.getTime() + 86400000));
      let label;
      if (isToday) label = 'Today';
      else if (isTomorrow) label = 'Tomorrow';
      else label = d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
      html += `<div class="upcoming-date-header${isToday ? ' today-header' : ''}">${label}</div>`;
      lastDateStr = dStr;
    }

    const timeStr = formatTime(e.start) + ' – ' + formatTime(e.end);

    if (e.isBusy) {
      const dotColor = e.owner === 'roselle' ? 'var(--roselle-color)' : 'var(--david-color)';
      const ownerName = e.owner === 'roselle' ? 'Roselle' : 'David';
      html += `<div class="upcoming-item">
        <div class="upcoming-color-dot" style="background:${dotColor}"></div>
        <div class="upcoming-item-content">
          <div class="upcoming-item-title" style="color:var(--busy);font-style:italic">${ownerName} — Busy</div>
          <div class="upcoming-item-time">${timeStr}</div>
        </div>
      </div>`;
    } else {
      html += `<div class="upcoming-item" style="cursor:pointer" onclick="editEvent('${e.id}')">
        <div class="upcoming-color-dot" style="background:${e.color}"></div>
        <div class="upcoming-item-content">
          <div class="upcoming-item-title">${e.recurrence_rule ? '&#x21BB; ' : ''}${esc(e.title)}</div>
          <div class="upcoming-item-time">${timeStr}</div>
          ${e.creator ? `<div class="upcoming-item-creator">${esc(e.creator)}</div>` : ''}
        </div>
      </div>`;
    }
  }

  list.innerHTML = html;
}

/* ================================================================
   MOBILE TAB SWITCHING
   ================================================================ */
function switchMobileTab(tab) {
  const sidebar = document.getElementById('upcomingSidebar');
  const calTab = document.getElementById('mTabCal');
  const upTab = document.getElementById('mTabUp');

  if (tab === 'upcoming') {
    sidebar.classList.add('mobile-visible');
    document.getElementById('sidebarCloseBtn').style.display = '';
    calTab.classList.remove('active');
    upTab.classList.add('active');
  } else {
    sidebar.classList.remove('mobile-visible');
    document.getElementById('sidebarCloseBtn').style.display = 'none';
    calTab.classList.add('active');
    upTab.classList.remove('active');
  }
}

function closeMobileSidebar() {
  switchMobileTab('calendar');
}

/* ================================================================
   SWIPE GESTURE SUPPORT
   ================================================================ */
let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 2) {
    if (document.getElementById('eventModal').classList.contains('open')) return;
    if (document.getElementById('settingsPanel').classList.contains('open')) return;
    if (document.getElementById('upcomingSidebar').classList.contains('mobile-visible')) return;
    navigateMonth(dx < 0 ? 1 : -1);
  }
}, { passive: true });

/* ================================================================
   KEYBOARD NAV
   ================================================================ */
document.addEventListener('keydown', e => {
  // If pin screen is visible, handle numpad
  if (document.getElementById('pinScreen').style.display !== 'none') {
    if (e.key >= '0' && e.key <= '9') pinPress(e.key);
    if (e.key === 'Backspace') pinBackspace();
    if (e.key === 'Enter') checkPin();
    return;
  }
  if (document.getElementById('eventModal').classList.contains('open')) {
    if (e.key === 'Escape') closeEventModal();
    return;
  }
  if (document.getElementById('settingsPanel').classList.contains('open')) {
    if (e.key === 'Escape') closeSettings();
    return;
  }
  if (e.key === 'ArrowLeft') navigateMonth(-1);
  if (e.key === 'ArrowRight') navigateMonth(1);
  if (e.key === 't' || e.key === 'T') goToday();
});
</script>
